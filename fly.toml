# Fly.io — build runs `docker build` (see Dockerfile). Redeploy after pushing this file.
# Docs: https://fly.io/docs/reference/configuration/

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpus = 1
