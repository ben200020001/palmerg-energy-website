# Fly.io — build runs `docker build` (see Dockerfile). Redeploy after pushing this file.
# Docs: https://fly.io/docs/reference/configuration/



# Must match your Fly.io app name (`fly apps list`). Change only if you create/rename the app.
app = "genoraenergy-express"
primary_region = "ams"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 256
