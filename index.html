<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Browsers often request /favicon.ico first; include ICO + PNG and bump ?v= when replacing icons (cache). -->
    <link rel="icon" href="/favicon.ico?v=4" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png?v=4" />
    <link rel="shortcut icon" href="/favicon.ico?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <title>Palmerg Energy</title>
    <meta name="application-name" content="Palmerg Energy" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Palmerg Energy & Resources Limited",
        "url": "https://palmergenergy.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://palmergenergy.com/SearchResults?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
